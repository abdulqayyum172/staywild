<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Signup</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md">
        <div class="flex border-b mb-6">
            <button id="loginTab" class="w-1/2 py-2 text-center font-semibold text-purple-600 border-b-2 border-purple-600 focus:outline-none">Login</button>
            <button id="signupTab" class="w-1/2 py-2 text-center font-semibold text-gray-500 hover:text-purple-600 focus:outline-none">Sign Up</button>
        </div>

        <form id="loginForm" class="space-y-4">
            <h2 class="text-2xl font-bold text-gray-800 text-center">Welcome Back</h2>
            <div>
                <label class="block text-gray-700">Email Address</label>
                <input type="email" class="w-full px-4 py-2 mt-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-purple-600" placeholder="you@example.com" required>
            </div>
            <div>
                <label class="block text-gray-700">Password</label>
                <input type="password" class="w-full px-4 py-2 mt-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-purple-600" placeholder="••••••••" required>
            </div>
            <button type="submit" class="w-full bg-purple-600 text-white py-2 rounded-md hover:bg-purple-700 transition duration-300">Login</button>
            <p class="text-sm text-center text-gray-600">Forgot password?</p>
        </form>

        <form id="signupForm" class="space-y-4 hidden">
            <h2 class="text-2xl font-bold text-gray-800 text-center">Create Account</h2>
            <div>
                <label class="block text-gray-700">Full Name</label>
                <input type="text" class="w-full px-4 py-2 mt-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-purple-600" placeholder="John Doe" required>
            </div>
            <div>
                <label class="block text-gray-700">Email Address</label>
                <input type="email" class="w-full px-4 py-2 mt-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-purple-600" placeholder="you@example.com" required>
            </div>
            <div>
                <label class="block text-gray-700">Password</label>
                <input type="password" class="w-full px-4 py-2 mt-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-purple-600" placeholder="••••••••" required>
            </div>
            <button type="submit" class="w-full bg-purple-600 text-white py-2 rounded-md hover:bg-purple-700 transition duration-300">Register</button>
        </form>
    </div>

    <script>
        const loginTab = document.getElementById('loginTab');
        const signupTab = document.getElementById('signupTab');
        const loginForm = document.getElementById('loginForm');
        const signupForm = document.getElementById('signupForm');

        loginTab.addEventListener('click', () => {
            loginForm.classList.remove('hidden');
            signupForm.classList.add('hidden');
            loginTab.classList.add('text-purple-600', 'border-purple-600');
            signupTab.classList.remove('text-purple-600', 'border-purple-600');
            signupTab.classList.add('text-gray-500');
        });

        signupTab.addEventListener('click', () => {
            signupForm.classList.remove('hidden');
            loginForm.classList.add('hidden');
            signupTab.classList.add('text-purple-600', 'border-purple-600');
            loginTab.classList.remove('text-purple-600', 'border-purple-600');
            loginTab.classList.add('text-gray-500');
        });
    </script>
</body>
</html>
